version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0-alpine
    container_name: faculty-clearance-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: faculty_clearance
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/init-db.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - faculty-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faculty-clearance-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5001
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-password123}@mongodb:27017/faculty_clearance?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_change_this_in_production_min_32_chars}
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-your_email@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your_app_password}
      EMAIL_FROM: ${EMAIL_FROM:-Faculty Clearance System <noreply@company.com>}
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - faculty-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5001
        REACT_APP_APP_NAME: Faculty Clearance System
    container_name: faculty-clearance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5001
      REACT_APP_APP_NAME: Faculty Clearance System
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - faculty-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  faculty-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
